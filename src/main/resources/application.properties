# Nombre del servicio
spring.application.name=eco

# Configuración de la base de datos (XAMPP + MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/marbel?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Configuración del servidor
server.port=8080

# JWT (no es necesario si no estás usando seguridad, pero no causa conflicto)
jwt.secret=MartinTomasGaunaOlivera
jwt.expiration=3600
jwt.issuer=eco-app

# Configuración de logging
logging.level.org.springframework.security=DEBUG
logging.level.com.example.eco=TRACE

# Swagger (esto es opcional)
springdoc.swagger-ui.path=/swagger-ui.html

spring.security.user.name=marbel
spring.security.user.password=marbel